<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil - Gabriel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            margin-top: 50px;
        }

        .card {
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        img {
            width: 140px;
            border-radius: 50%;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #e4e4e4;
            margin: 5px;
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="sua-foto.jpg" alt="Minha Foto">

        <h1>Olá, eu sou Gabriel 👋</h1>
        <p><strong>Idade:</strong> 22 anos</p>
        <p>Quero me tornar desenvolvedor 💻</p>

        <h3>Meus conhecimentos:</h3>
        <ul>
            <li>HTML</li>
            <li>C#</li>
            <li>Corrida 🏃‍♂️</li>
        </ul>
    </div>

</body>
</html>
